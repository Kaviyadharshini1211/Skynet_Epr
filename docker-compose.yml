version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: skynet_postgres
    restart: always
    environment:
      POSTGRES_USER: skynet
      POSTGRES_PASSWORD: skynet123
      POSTGRES_DB: skynet_epr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: